services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: smart-education-frontend:local
    restart: unless-stopped
    environment:
      # Change this to a service in the same Docker network when the gateway is
      # containerized, for example: http://gateway:18080
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:18080}
    extra_hosts:
      # Works on Docker Desktop and modern Linux Docker when the gateway runs on the host.
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_HOST_PORT:-8088}:80"
