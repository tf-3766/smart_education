server:
  port: ${AI_SERVER_PORT:18082}

spring:
  application:
    name: edu-ai-service
  ai:
    model:
      chat: ${AI_CHAT_PROVIDER:none}
      embedding: ${AI_EMBEDDING_PROVIDER:none}
    openai:
      # Alibaba Cloud Bailian exposes an OpenAI-compatible endpoint used by Spring AI.
      api-key: ${DASHSCOPE_API_KEY:disabled}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
          temperature: ${AI_TEMPERATURE:0.2}
          max-tokens: ${AI_MAX_TOKENS:2048}
    vectorstore:
      type: ${AI_VECTOR_STORE_TYPE:none}
      qdrant:
        host: ${QDRANT_HOST:127.0.0.1}
        port: ${QDRANT_GRPC_PORT:16334}
        collection-name: ${QDRANT_COLLECTION:smart_education_course_knowledge}
        use-tls: ${QDRANT_USE_TLS:false}
        initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:true}
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:18848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:18848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
    openfeign:
      client:
        config:
          edu-biz-service:
            connect-timeout: ${BIZ_FEIGN_CONNECT_TIMEOUT_MS:1500}
            read-timeout: ${BIZ_FEIGN_READ_TIMEOUT_MS:5000}
edu:
  ai:
    provider-name: ${AI_PROVIDER_NAME:aliyun-bailian}
    jwt:
      secret: ${JWT_SECRET}
      ttl: ${JWT_TTL:PT2H}
      issuer: ${JWT_ISSUER:edu-biz-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
