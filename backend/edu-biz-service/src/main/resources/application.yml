server:
  port: ${BIZ_SERVER_PORT:18081}

spring:
  application:
    name: edu-biz-service
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/smart_education?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:smart_education}
    password: ${RABBITMQ_PASSWORD:}
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:50MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:52MB}
  cloud:
    nacos:
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:18848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:18848}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

edu:
  security:
    jwt:
      secret: ${JWT_SECRET}
      ttl: ${JWT_TTL:PT2H}
      issuer: ${JWT_ISSUER:edu-biz-service}
  storage:
    root: ${FILE_STORAGE_ROOT:./data/uploads}
    max-file-size: ${FILE_MAX_SIZE:50MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
