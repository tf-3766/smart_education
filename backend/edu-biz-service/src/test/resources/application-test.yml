spring:
  datasource:
    url: jdbc:h2:mem:edu_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration,classpath:db/localmigration
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  data:
    redis:
      repositories:
        enabled: false

edu:
  security:
    jwt:
      secret: test-only-jwt-secret-with-at-least-32-bytes
      ttl: PT15M
      issuer: edu-biz-service-test

logging:
  level:
    com.alibaba.cloud.nacos: WARN
