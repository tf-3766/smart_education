spring:
  datasource:
    url: jdbc:h2:mem:edu_test_${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/online_education_bootstrap.sql
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
  data:
    redis:
      repositories:
        enabled: false

edu:
  security:
    jwt:
      secret: test-only-jwt-secret-with-at-least-32-bytes
      ttl: PT15M
      issuer: edu-biz-service-test
  storage:
    root: ${java.io.tmpdir}/smart-education-test-uploads
    max-file-size: 2MB

logging:
  level:
    com.alibaba.cloud.nacos: WARN
