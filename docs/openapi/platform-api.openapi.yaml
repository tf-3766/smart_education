openapi: 3.1.0
info:
  title: 在线教育辅助教学系统 - 全局前后端接口契约
  version: 0.3.0
  description: 面向前端、Biz 后端和 AI 后端并行开发的接口草案。已实现课程接口以 course-module.openapi.yaml 为准。
servers:
  - url: http://localhost:18080
    description: edu-gateway
tags:
  - name: Auth
  - name: Course
  - name: Assignment
  - name: Forum
  - name: Warning
  - name: Exam
  - name: AI
  - name: Internal
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/courses/{courseId}/assignments:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Assignment]
      operationId: listTeacherAssignments
      parameters:
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/Size'}
        - {$ref: '#/components/parameters/Status'}
      responses:
        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Assignment]
      operationId: createAssignment
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AssignmentWriteRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
        '400': {$ref: '#/components/responses/Error'}
  /api/v1/teacher/assignments/{assignmentId}/publish:
    parameters:
      - {$ref: '#/components/parameters/AssignmentId'}
    post:
      tags: [Assignment]
      operationId: publishAssignment
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/teacher/assignments/{assignmentId}/submissions:
    parameters:
      - {$ref: '#/components/parameters/AssignmentId'}
    get:
      tags: [Assignment]
      operationId: listAssignmentSubmissions
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/submissions/{submissionId}/grade:
    parameters:
      - {$ref: '#/components/parameters/SubmissionId'}
    post:
      tags: [Assignment]
      operationId: gradeSubmission
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/GradeRequest'}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/student/courses/{courseId}/assignments:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Assignment]
      operationId: listStudentAssignments
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/student/assignments/{assignmentId}/submissions:
    parameters:
      - {$ref: '#/components/parameters/AssignmentId'}
    post:
      tags: [Assignment]
      operationId: submitAssignment
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SubmissionRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
  /api/v1/student/courses/{courseId}/forum/topics:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Forum]
      operationId: listForumTopics
      responses:
        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Forum]
      operationId: createForumTopic
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ForumTopicRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
  /api/v1/student/forum/topics/{topicId}/replies:
    parameters:
      - {$ref: '#/components/parameters/TopicId'}
    post:
      tags: [Forum]
      operationId: replyForumTopic
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ForumReplyRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
  /api/v1/student/warnings:
    get:
      tags: [Warning]
      operationId: listStudentWarnings
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/courses/{courseId}/warnings:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Warning]
      operationId: listCourseWarnings
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/warnings/{warningId}/handle:
    parameters:
      - {$ref: '#/components/parameters/WarningId'}
    post:
      tags: [Warning]
      operationId: handleWarning
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WarningHandleRequest'}
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/courses/{courseId}/question-banks:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Exam]
      operationId: listQuestionBanks
      responses:
        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Exam]
      operationId: createQuestionBank
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/QuestionBankRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
  /api/v1/teacher/courses/{courseId}/exams:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Exam]
      operationId: listTeacherExams
      responses:
        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Exam]
      operationId: createExam
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ExamWriteRequest'}
      responses:
        '201': {$ref: '#/components/responses/Success'}
  /api/v1/student/courses/{courseId}/exams:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    get:
      tags: [Exam]
      operationId: listStudentExams
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/ai/courses/{courseId}/qa/stream:
    parameters:
      - {$ref: '#/components/parameters/CourseId'}
    post:
      tags: [AI]
      operationId: streamCourseQa
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AiQuestionRequest'}
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '403': {$ref: '#/components/responses/Error'}
        '429': {$ref: '#/components/responses/Error'}
  /api/v1/ai/submissions/{submissionId}/comment-draft:
    parameters:
      - {$ref: '#/components/parameters/SubmissionId'}
    post:
      tags: [AI]
      operationId: createSubmissionCommentDraft
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /api/v1/ai/exams/paper-suggestions:
    post:
      tags: [AI]
      operationId: suggestExamPaper
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PaperSuggestionRequest'}
      responses:
        '200': {$ref: '#/components/responses/Success'}
  /_internal/v1/ai-context/course:
    post:
      tags: [Internal]
      operationId: getAiCourseContext
      description: Internal Feign endpoint. Gateway must not expose this path.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AiCourseContextRequest'}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '403': {$ref: '#/components/responses/Error'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CourseId: {name: courseId, in: path, required: true, schema: {type: string, pattern: '^[0-9]+$'}}
    AssignmentId: {name: assignmentId, in: path, required: true, schema: {type: string, pattern: '^[0-9]+$'}}
    SubmissionId: {name: submissionId, in: path, required: true, schema: {type: string, pattern: '^[0-9]+$'}}
    TopicId: {name: topicId, in: path, required: true, schema: {type: string, pattern: '^[0-9]+$'}}
    WarningId: {name: warningId, in: path, required: true, schema: {type: string, pattern: '^[0-9]+$'}}
    Page: {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
    Size: {name: size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    Status: {name: status, in: query, schema: {type: string}}
  responses:
    Success:
      description: Unified success response
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiResponse'}
    Error:
      description: Unified error response
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiResponse'}
  schemas:
    ApiResponse:
      type: object
      required: [code, message, errors, traceId, timestamp]
      properties:
        code: {type: string, example: SUCCESS}
        message: {type: string, example: OK}
        data: {}
        errors:
          type: array
          items: {type: object}
        traceId: {type: string}
        timestamp: {type: string, format: date-time}
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: {type: string, example: teacher}
        password: {type: string, format: password, example: Teacher@123}
    AssignmentWriteRequest:
      type: object
      required: [title, maxScore]
      properties:
        lessonId: {type: string}
        title: {type: string, maxLength: 160}
        description: {type: string}
        maxScore: {type: number, minimum: 0}
        openAt: {type: string, format: date-time}
        dueAt: {type: string, format: date-time}
        version: {type: integer, minimum: 0}
    SubmissionRequest:
      type: object
      properties:
        content: {type: string}
        fileKey: {type: string}
    GradeRequest:
      type: object
      required: [score, maxScore]
      properties:
        score: {type: number}
        maxScore: {type: number}
        teacherComment: {type: string}
        aiCommentDraftId: {type: string}
        publishNow: {type: boolean, default: false}
        version: {type: integer, minimum: 0}
    ForumTopicRequest:
      type: object
      required: [title, content]
      properties:
        title: {type: string, maxLength: 160}
        content: {type: string}
    ForumReplyRequest:
      type: object
      required: [content]
      properties:
        parentReplyId: {type: string}
        content: {type: string}
    WarningHandleRequest:
      type: object
      required: [action]
      properties:
        action: {type: string, enum: [HANDLED, IGNORED]}
        remark: {type: string}
        version: {type: integer, minimum: 0}
    QuestionBankRequest:
      type: object
      required: [name]
      properties:
        name: {type: string}
        description: {type: string}
    ExamWriteRequest:
      type: object
      required: [title, totalScore]
      properties:
        title: {type: string}
        description: {type: string}
        startAt: {type: string, format: date-time}
        endAt: {type: string, format: date-time}
        durationMinutes: {type: integer, minimum: 1}
        totalScore: {type: number}
    AiQuestionRequest:
      type: object
      required: [question]
      properties:
        lessonId: {type: string}
        materialId: {type: string}
        question: {type: string}
    PaperSuggestionRequest:
      type: object
      required: [courseId, questionTypes, totalScore]
      properties:
        courseId: {type: string}
        questionTypes:
          type: array
          items: {type: string}
        totalScore: {type: number}
        difficulty: {type: string}
    AiCourseContextRequest:
      type: object
      required: [userId, roleCode, courseId, purpose]
      properties:
        userId: {type: string}
        roleCode: {type: string, enum: [STUDENT, TEACHER, ADMIN]}
        courseId: {type: string}
        lessonId: {type: string}
        materialId: {type: string}
        purpose: {type: string, enum: [COURSE_QA, LESSON_SUMMARY_DRAFT, GRADING_COMMENT_DRAFT, RISK_EXPLANATION, PAPER_SUGGESTION]}
        traceId: {type: string}
security:
  - bearerAuth: []
